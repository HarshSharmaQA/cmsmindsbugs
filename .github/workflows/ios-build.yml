name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
    
    - name: Install dependencies
      run: |
        cd ios/BugScribe
        # Add any dependency installation here (CocoaPods, SPM, etc.)
    
    - name: Build iOS app
      run: |
        cd ios/BugScribe
        xcodebuild clean build \
          -project BugScribe.xcodeproj \
          -scheme BugScribe \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Archive build artifacts
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: ios-build
        path: ios/BugScribe/build/
        retention-days: 7
    
    - name: Build for Release (Optional)
      if: github.ref == 'refs/heads/main'
      run: |
        cd ios/BugScribe
        xcodebuild archive \
          -project BugScribe.xcodeproj \
          -scheme BugScribe \
          -archivePath BugScribe.xcarchive \
          CODE_SIGNING_ALLOWED=NO
