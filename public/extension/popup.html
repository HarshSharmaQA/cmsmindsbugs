<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BugScribe</title>
    <style>
        :root {
            --bg: #0c0a1a;
            --card-bg: #0f172a;
            --border: #1e293b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #6366f1;
            --text: #ffffff;
            --text-muted: #94a3b8;
            --success: #4ade80;
            --error: #ef4444;
            --error-hover: #dc2626;
        }

        body {
            width: 340px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 0;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            padding: 16px;
        }

        header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 16px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .badge {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ── Views ── */
        .view {
            display: none;
            animation: fadeIn 0.2s ease-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Forms & Elements ── */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 16px 0 8px;
            display: block;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: white;
            font-size: 13px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--text);
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-danger {
            background: var(--error);
        }

        .btn-danger:hover {
            background: var(--error-hover);
        }

        /* ── Project Info ── */
        .project-card {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(99, 102, 241, 0.05));
            border: 1px solid rgba(79, 70, 229, 0.2);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .project-card h2 {
            margin: 0;
            font-size: 14px;
            color: var(--text);
        }

        .project-card .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .avatar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 10px;
        }

        /* ── Bug List ── */
        .bug-list {
            margin-top: 10px;
            max-height: 240px;
            overflow-y: auto;
        }

        .bug-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bug-item:last-child {
            border-bottom: none;
        }

        .bug-title {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bug-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
        }

        .status-pill {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-open {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .status-in_progress {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .status-resolved {
            background: rgba(168, 85, 247, 0.1);
            color: #c084fc;
        }

        .status-closed {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
        }

        /* ── Utility ── */
        .flex-row {
            display: flex;
            gap: 10px;
        }

        .mt-auto {
            margin-top: auto;
        }

        .text-center {
            text-align: center;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            color: var(--error);
            font-size: 11px;
            background: rgba(239, 68, 68, 0.1);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: none;
        }

        .success-msg {
            color: var(--success);
            font-size: 11px;
            background: rgba(74, 222, 128, 0.1);
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <h2>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m8 2 1.88 1.88" />
                <path d="M14.12 3.88 16 2" />
                <path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1" />
                <path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6" />
                <path d="M12 20v-9" />
            </svg>
            BugScribe
        </h2>
        <span class="badge">PRO</span>
    </header>

    <div class="container">
        <div id="errorBanner" class="error-msg"></div>
        <div id="successBanner" class="success-msg"></div>

        <!-- ── VIEW 1: LOGIN ── -->
        <div id="loginView" class="view">
            <span class="section-label">Sign In to BugScribe</span>
            <label for="loginEmail" class="section-label" style="margin-top:0">Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@company.com" />

            <label for="loginPassword" class="section-label" style="margin-top:0">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />

            <button id="loginBtn">
                <span>Login</span>
            </button>

            <div class="divider"></div>
            <p style="font-size:11px; color:var(--text-muted); text-align:center;">
                Don't have an account? <a href="http://localhost:3000" target="_blank"
                    style="color:var(--primary);text-decoration:none;">Sign up</a>
            </p>
        </div>

        <!-- ── VIEW 2: SELECT PROJECT ── -->
        <div id="projectView" class="view">
            <div class="avatar-row">
                <div class="avatar" id="userInitial">U</div>
                <span id="userEmail">user@example.com</span>
                <button id="logoutBtn" class="btn-outline"
                    style="width:auto; padding:4px 8px; font-size:10px; margin-left:auto;">Logout</button>
            </div>

            <span class="section-label">Select Workspace</span>
            <select id="projectSelect">
                <option value="" disabled selected>Loading projects...</option>
            </select>

            <button id="confirmProjectBtn">
                <span>Access Workspace</span>
            </button>
        </div>

        <!-- ── VIEW 3: MAIN ACTIONS ── -->
        <div id="actionsView" class="view">
            <div class="project-card">
                <div class="label">Active Workspace</div>
                <h2 id="activeProjectName">Project Name</h2>
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button id="switchProjectBtn" class="btn-outline"
                        style="font-size:10px; padding:4px 8px;">Switch</button>
                    <button id="openDashboardBtn" class="btn-outline"
                        style="font-size:10px; padding:4px 8px;">Dashboard</button>
                </div>
            </div>

            <button id="reportBtn" class="btn-danger" style="margin-bottom:12px; height: 50px; font-size: 14px;">
                <span>📸</span> Report Bug on Current Page
            </button>

            <button id="showBugsBtn" class="btn-outline">
                <span>📋</span> View Recent Bugs
            </button>
        </div>

        <!-- ── VIEW 4: BUG LIST ── -->
        <div id="bugListView" class="view">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                <button id="backToActionsBtn" class="btn-outline" style="width:auto; padding:6px 10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </button>
                <span class="section-label" style="margin:0">Recent Bug Reports</span>
            </div>

            <div id="bugListContainer" class="bug-list">
                <div class="text-center" style="padding:20px; color:var(--text-muted); font-size:12px;">
                    Loading reports...
                </div>
            </div>

            <button id="refreshBugsBtn" class="btn-outline" style="margin-top:12px; font-size:11px;">
                Refresh List
            </button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
